<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Archives Étudiant</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #6c757d; color: white; }
        .btn-retour { display: block; width: 100%; padding: 10px; margin-top: 20px; background: #007BFF; color: white; text-align: center; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Mes Archives</h1>
        <p>Historique des documents et dossiers :</p>

        <table>
            <thead>
                <tr>
                    <th>Année</th>
                    <th>Document</th>
                </tr>
            </thead>
            <tbody>
                {% for archive in archives %}
                <tr>
                    <td>{{ archive.annee }}</td>
                    <td>{{ archive.document }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="2">Aucune archive disponible.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="/releve_notes" class="btn-retour">⬅ Retour au relevé</a>
    </div>
</body>
</html>
