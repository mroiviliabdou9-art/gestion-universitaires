<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Relevé de Notes</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .box { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* En-tête avec logo */
        .header { display: flex; align-items: center; border-bottom: 2px solid #007BFF; padding-bottom: 15px; margin-bottom: 25px; }
        .logo-small { width: 60px; height: 60px; margin-right: 20px; border-radius: 8px; }
        h1 { color: #007BFF; margin: 0; }
        
        /* Tableau */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #007BFF; color: white; }
        
        /* Pied de page et bouton */
        .btn-logout { display: block; width: 100%; padding: 12px; margin-top: 30px; background: #dc3545; color: white; text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; }
        /* Style par défaut pour mobile (le plus simple) */
        .box { width: 90%; padding: 15px; }

        /* Pour les tablettes (écran > 600px) */
        @media (min-width: 600px) {
        .box { width: 450px; }
        }

        /* Pour les PC (écran > 900px) */
        @media (min-width: 900px) {
        .box { width: 600px; }
        }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="box">
        <div class="header">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="logo-small">
            <h1>Relevé de Notes</h1>
        </div>

        <p><strong>Étudiant(e) :</strong> {{ session.get('user_id') }}</p>

        <table>
            <thead>
                <tr>
                    <th>Matière</th>
                    <th>Notes</th>
                    <th>Moyenne</th>
                </tr>
            </thead>
            <tbody>
                {% for item in notes %}
                <tr>
                    <td>{{ item.matiere }}</td>
                    <td>{{ item.liste_notes }}</td>
                    <td><strong>{{ "%.2f"|format(item.moyenne) }}</strong></td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3">Aucune note disponible pour le moment.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="/" class="btn-logout">Se déconnecter</a>
    </div>
</body>
</html>
