<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Relevé</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #007BFF; color: white; }
        .btn-logout { background: #dc3545; color: white; display: block; text-align: center; padding: 10px; border-radius: 4px; text-decoration: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Relevé de {{ session['nom'] }}</h1>
        
        {% if restriction %}
            <div style="background:#f8d7da; padding:15px; color:#721c24; text-align:center;">
                Accès restreint : Veuillez régulariser vos frais de scolarité.
            </div>
        {% else %}
            <table>
                <tr><th>Matière</th><th>Note</th></tr>
                {% for note in notes %}
                <tr><td>{{ note.matiere }}</td><td>{{ note.note }} / 20</td></tr>
                {% endfor %}
            </table>
        {% endif %}

        <a href="{{ url_for('logout') }}" class="btn-logout">Déconnexion</a>
    </div>
</body>
</html>
