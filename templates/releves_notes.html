<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Relevé de Notes</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #007BFF; color: white; }
        .logout-btn { background: #dc3545; display: block; text-align: center; color: white; text-decoration: none; padding: 10px; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Relevé de notes</h1>
        <p><strong>Étudiant :</strong> {{ session['nom'] }}</p>

        <table>
            <thead>
                <tr>
                    <th>Matière</th>
                    <th>Note / 20</th>
                </tr>
            </thead>
            <tbody>
                {% for note in notes %}
                <tr>
                    <td>{{ note.matiere }}</td>
                    <td>{{ note.note }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="2">Aucune note enregistrée pour le moment.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('logout') }}" class="logout-btn">Se déconnecter</a>
    </div>
</body>
</html>
