<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Relevé de Notes</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Logo en haut à gauche */
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .logo-small { width: 60px; height: 60px; margin-right: 15px; border-radius: 50%; }
        
        h1 { color: #007BFF; margin: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #007BFF; color: white; }
        .btn-logout { display: block; width: 100%; padding: 10px; margin-top: 20px; background: #dc3545; color: white; text-align: center; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="header">
            <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" class="logo-small">
            <h1>Mon Relevé</h1>
        </div>

        <p><strong>Étudiant :</strong> {{ session.get('nom') }}</p>

        <table>
            <thead>
                <tr>
                    <th>Matière</th>
                    <th>Notes</th>
                    <th>Moyenne</th>
                </tr>
            </thead>
            <tbody>
                {% for item in notes %}
                <tr>
                    <td>{{ item.matiere }}</td>
                    <td>{{ item.liste_notes }}</td>
                    <td><strong>{{ "%.2f"|format(item.moyenne) }}</strong></td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3">Aucune note enregistrée.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('logout') }}" class="btn-logout">Se déconnecter</a>
    </div>
</body>
</html>
