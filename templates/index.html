<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Système de Gestion</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
            background-color: #f4f6f9; min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
        }
        .conteneur-connexion { 
            width: 100%; max-width: 400px; background: white; 
            padding: 30px; border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1); 
        }
        h1 { color: #333; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input { 
            width: 100%; padding: 12px; margin-top: 5px; 
            border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; 
        }
        button { 
            width: 100%; padding: 12px; margin-top: 20px; 
            background-color: #007BFF; color: white; border: none; 
            border-radius: 6px; cursor: pointer; font-weight: bold; 
        }
        button:hover { background-color: #0056b3; }
        .message-erreur { 
            color: #dc3545; font-size: 14px; text-align: center; 
            margin-top: 15px; font-weight: bold; 
        }
    </style>
</head>
<body>

    <div class="conteneur-connexion">
        <h1>Connexion</h1>

        <form action="/" method="post">
            <label>Identifiant :</label>
            <input type="text" name="identifiant" placeholder="Ex: ADM_01" required>

            <label>Mot de passe :</label>
            <input type="password" name="password" placeholder="••••••••" required>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="message-erreur">{{ messages[0] }}</div>
              {% endif %}
            {% endwith %}

            <button type="submit">Se connecter</button>
        </form>
    </div>

</body>
</html>
