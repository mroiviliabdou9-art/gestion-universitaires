<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Interface Administration</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .section { display: none; margin-top: 20px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .btn-nav { background: #007BFF; color: white; }
        .btn-retour { background: #6c757d; color: white; }
        .btn-valider { background:#28a745; color:white; }
        .box { width: 90%; padding: 15px; }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="box">
        <h1>Espace Administration</h1>
        
        <div id="menu-principal">
            <button class="btn-nav" onclick="show('inscrire')">1 - Inscrire un étudiant</button>
            <button class="btn-nav" onclick="show('notes')">2 - Remplissage des notes</button>
            <button class="btn-nav" onclick="show('acces')">3 - Gestion accès</button>
            <button class="btn-nav" onclick="show('profil')">4 - Modifier profil admin</button>
            <button class="btn-nav" onclick="show('archives')">5 - Archives</button>
        </div>

        <div id="inscrire" class="section">
            <h2>Inscription</h2>
            <form action="/ajouter_etudiant" method="POST">
                <input type="text" name="id" placeholder="Matricule" required>
                <input type="text" name="nom" placeholder="Nom complet" required>
                <input type="text" name="mention" placeholder="Niveau / Mention" required>
                <input type="password" name="mdp" placeholder="Mot de passe" required>
                <button type="submit" class="btn-valider">Enregistrer</button>
            </form>
            <button class="btn-retour" onclick="show('menu-principal')">⬅ Retour</button>
        </div>

        <div id="notes" class="section">
            <h2>Ajouter une note</h2>
            <form action="/ajouter_note" method="POST">
                <input type="text" name="id" placeholder="Matricule étudiant" required>
                <input type="text" name="matiere" placeholder="Matière" required>
                <input type="number" name="note" step="0.5" placeholder="Note (ex: 15.5)" required>
                <select name="semestre">
                    <option value="S1">Semestre 1</option>
                    <option value="S2">Semestre 2</option>
                </select>
                <input type="text" name="annee" placeholder="Année (ex: 2026)" required>
                <button type="submit" class="btn-valider">Valider</button>
            </form>
            <button class="btn-retour" onclick="show('menu-principal')">⬅ Retour</button>
        </div>

        <div id="acces" class="section">
            <h2>Gestion accès</h2>
            <form action="/update_periode" method="POST">
                <select name="periode">
                    <option value="S1">Semestre 1</option>
                    <option value="S2">Semestre 2</option>
                    <option value="REPECHAGE">Répêchage</option>
                    <option value="FERME">Fermer le système</option>
                </select>
                <button type="submit" class="btn-valider">Appliquer</button>
            </form>
            <button class="btn-retour" onclick="show('menu-principal')">⬅ Retour</button>
        </div>

        <div id="profil" class="section">
            <h2>Profil Administration</h2>
            <input type="text" placeholder="Nouveau nom administrateur">
            <input type="password" placeholder="Nouveau mot de passe">
            <button class="btn-valider">Sauvegarder</button>
            <button class="btn-retour" onclick="show('menu-principal')">⬅ Retour</button>
        </div>

        <div id="archives" class="section">
            <h2>Archives</h2>
            <form action="/archives" method="POST">
                <input type="text" name="id" placeholder="Matricule étudiant">
                <input type="text" name="annee" placeholder="Année">
                <button type="submit" class="btn-nav">Consulter archives</button>
            </form>
            <button class="btn-retour" onclick="show('menu-principal')">⬅ Retour</button>
        </div>
    </div>

    <script>
        function show(id) {
            document.getElementById('menu-principal').style.display = 'none';
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            if(id === 'menu-principal') {
                document.getElementById('menu-principal').style.display = 'block';
            } else {
                document.getElementById(id).style.display = 'block';
            }
        }
    </script>
</body>
</html>
