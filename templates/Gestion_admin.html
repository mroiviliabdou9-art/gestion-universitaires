<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Espace Administration</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #007BFF; text-align: center; }
        .section { display: none; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .nav-btn { background: #007BFF; }
        .logout-btn { background: #dc3545; display: block; text-align: center; color: white; text-decoration: none; padding: 10px; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Administration</h1>
        
        <button class="nav-btn" onclick="show('inscrire')">Inscrire un étudiant</button>
        <button class="nav-btn" onclick="show('note')">Ajouter une note</button>

        <div id="inscrire" class="section">
            <form action="/ajouter_etudiant" method="POST">
                <input type="text" name="id_etudiant" placeholder="ID Étudiant (ex: ETU_01)" required>
                <input type="text" name="nom" placeholder="Nom et Prénom" required>
                <input type="password" name="mot_de_passe" placeholder="Mot de passe" required>
                <button type="submit">Enregistrer</button>
            </form>
        </div>

        <div id="note" class="section">
            <form action="/ajouter_note" method="POST">
                <input type="text" name="id_etudiant" placeholder="ID Étudiant" required>
                <input type="text" name="matiere" placeholder="Matière" required>
                <input type="number" step="0.5" name="note" placeholder="Note / 20" required>
                <button type="submit">Ajouter la note</button>
            </form>
        </div>

        <a href="{{ url_for('logout') }}" class="logout-btn">Se déconnecter</a>
    </div>

    <script>
        function show(id) {
            document.getElementById('inscrire').style.display = 'none';
            document.getElementById('note').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>
